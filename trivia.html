<main class="main">
    <h3>BMI Calculator Trivia</h3>
    <p>Enter your height(cm) and weight(kg) to calculate BMI and body category</p>
    <div style="margin-top:15px;">
        <label>Height (cm):</label>
        <input type="number" id="height" placeholder="e.g. 170">
        <br><br>
        <label>Weight (kg):</label>
        <input type="number" id="weight" placeholder="e.g. 62">
        <br><br>
        <button onclick="calculateBMI()">Calculate BMI</button>
        <p id="bmiResult" style="margin-top:12px; font-size:18px;"></p>
    </div>
</main>
